<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scrapy Web UI</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                          */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --border:   #334155;
      --accent:   #38bdf8;
      --accent2:  #818cf8;
      --text:     #e2e8f0;
      --muted:    #94a3b8;
      --green:    #4ade80;
      --red:      #f87171;
      --yellow:   #fbbf24;
      --radius:   10px;
      --font:     'Inter', 'Segoe UI', system-ui, sans-serif;
      --mono:     'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ------------------------------------------------------------------ */
    /* Header                                                               */
    /* ------------------------------------------------------------------ */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    header .logo svg { width: 32px; height: 32px; }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header .badge {
      background: var(--border);
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                               */
    /* ------------------------------------------------------------------ */
    main {
      flex: 1;
      padding: 28px 24px;
      display: grid;
      grid-template-columns: 340px 1fr;
      grid-template-rows: auto 1fr;
      gap: 20px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }

    /* ------------------------------------------------------------------ */
    /* Cards                                                                */
    /* ------------------------------------------------------------------ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ------------------------------------------------------------------ */
    /* Control panel                                                        */
    /* ------------------------------------------------------------------ */
    #controls { grid-column: 1; grid-row: 1; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="url"],
    input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s;
    }

    input[type="url"]:focus,
    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,.15);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .depth-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .depth-row input[type="range"] { flex: 1; }

    .depth-badge {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent);
      font-weight: 700;
      font-size: 1rem;
      min-width: 44px;
      text-align: center;
      padding: 6px 8px;
    }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }

    .btn {
      flex: 1;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 10px 0;
      transition: filter .15s, opacity .15s;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover:not(:disabled) { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-start {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
    }

    .btn-stop {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: #fff;
    }

    /* ------------------------------------------------------------------ */
    /* Status indicator                                                     */
    /* ------------------------------------------------------------------ */
    #status-bar {
      margin-top: 20px;
      padding: 10px 14px;
      border-radius: 7px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-idle     { background: var(--muted); }
    .dot-running  { background: var(--green); animation: pulse 1.2s infinite; }
    .dot-stopped  { background: var(--red); }
    .dot-finished { background: var(--accent); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,.6); }
      50%       { box-shadow: 0 0 0 6px rgba(74,222,128,0); }
    }

    /* ------------------------------------------------------------------ */
    /* Stats panel                                                          */
    /* ------------------------------------------------------------------ */
    #stats-panel { grid-column: 1; grid-row: 2; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 12px 14px;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* ------------------------------------------------------------------ */
    /* Log panel                                                            */
    /* ------------------------------------------------------------------ */
    #log-panel {
      grid-column: 2;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 900px) {
      #log-panel { grid-column: 1; grid-row: 3; }
    }

    .log-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 4px 10px;
      transition: border-color .15s, color .15s;
    }

    .btn-clear:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #log-container {
      flex: 1;
      background: #090f1a;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-y: auto;
      padding: 14px;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.6;
      min-height: 400px;
      max-height: 70vh;
      scroll-behavior: smooth;
    }

    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
      padding: 1px 0;
    }

    .log-info    { color: #93c5fd; }
    .log-warning { color: var(--yellow); }
    .log-error   { color: var(--red); }
    .log-scraped { color: var(--green); }
    .log-done    { color: var(--accent2); font-weight: 700; }
    .log-default { color: #cbd5e1; }

    /* Auto-scroll toggle */
    .autoscroll-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .autoscroll-row input { accent-color: var(--accent); cursor: pointer; }
  </style>
</head>
<body>

<!-- ===================================================================== -->
<!-- Header                                                                 -->
<!-- ===================================================================== -->
<header>
  <span class="logo">
    <!-- Scrapy-inspired spider icon -->
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="32" cy="32" r="30" fill="#1e3a5f"/>
      <!-- body -->
      <ellipse cx="32" cy="34" rx="10" ry="13" fill="#38bdf8"/>
      <!-- head -->
      <circle cx="32" cy="20" r="7" fill="#38bdf8"/>
      <!-- legs left -->
      <line x1="22" y1="28" x2="6"  y2="20" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="22" y1="33" x2="4"  y2="33" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="22" y1="38" x2="6"  y2="46" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <!-- legs right -->
      <line x1="42" y1="28" x2="58" y2="20" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="42" y1="33" x2="60" y2="33" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="42" y1="38" x2="58" y2="46" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <!-- eyes -->
      <circle cx="29" cy="19" r="2" fill="#0f172a"/>
      <circle cx="35" cy="19" r="2" fill="#0f172a"/>
    </svg>
  </span>
  <h1>Scrapy Web UI</h1>
  <span class="badge">Live</span>
</header>

<!-- ===================================================================== -->
<!-- Main                                                                   -->
<!-- ===================================================================== -->
<main>

  <!-- ------------------------------------------------------------------- -->
  <!-- Controls                                                             -->
  <!-- ------------------------------------------------------------------- -->
  <section class="card" id="controls">
    <div class="card-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M19.07 19.07A10 10 0 0 0 4.93 4.93"/></svg>
      Crawl Settings
    </div>

    <div class="field">
      <label for="url-input">Target URL</label>
      <input
        id="url-input"
        type="url"
        placeholder="https://example.com"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="field">
      <label for="depth-range">
        Crawl Depth
        <span style="color:var(--muted);font-weight:400">&mdash; how many link-hops to follow</span>
      </label>
      <div class="depth-row">
        <input
          id="depth-range"
          type="range"
          min="1"
          max="10"
          value="2"
          oninput="syncDepth(this.value)"
        />
        <div class="depth-badge" id="depth-badge">2</div>
      </div>
      <input
        id="depth-number"
        type="number"
        min="1"
        max="10"
        value="2"
        style="margin-top:8px"
        oninput="syncDepth(this.value)"
      />
    </div>

    <div class="btn-row">
      <button class="btn btn-start" id="btn-start" onclick="startCrawl()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Start
      </button>
      <button class="btn btn-stop" id="btn-stop" onclick="stopCrawl()" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop
      </button>
    </div>

    <div id="status-bar">
      <span class="dot dot-idle" id="status-dot"></span>
      <span id="status-text">Idle &mdash; ready to crawl</span>
    </div>
  </section>

  <!-- ------------------------------------------------------------------- -->
  <!-- Stats                                                                -->
  <!-- ------------------------------------------------------------------- -->
  <section class="card" id="stats-panel">
    <div class="card-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Live Stats
    </div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">Requests</div>
        <div class="stat-value" id="stat-requests">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Responses</div>
        <div class="stat-value" id="stat-responses">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Items</div>
        <div class="stat-value" id="stat-items">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Errors</div>
        <div class="stat-value" id="stat-errors" style="color:var(--red)">0</div>
      </div>
    </div>
  </section>

  <!-- ------------------------------------------------------------------- -->
  <!-- Log output                                                           -->
  <!-- ------------------------------------------------------------------- -->
  <section class="card" id="log-panel">
    <div class="log-toolbar">
      <div class="card-title" style="margin-bottom:0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        Live Output
      </div>
      <button class="btn-clear" onclick="clearLog()">Clear</button>
    </div>

    <div id="log-container">
      <div class="log-line log-default">Waiting for a crawl to start&hellip;</div>
    </div>

    <div class="autoscroll-row">
      <input type="checkbox" id="autoscroll" checked />
      <label for="autoscroll" style="margin:0;text-transform:none;font-weight:400;cursor:pointer">
        Auto-scroll to latest
      </label>
    </div>
  </section>

</main>

<!-- ===================================================================== -->
<!-- JavaScript                                                             -->
<!-- ===================================================================== -->
<script>
  /* ---- depth sync ---- */
  function syncDepth(val) {
    val = Math.max(1, Math.min(10, parseInt(val, 10) || 1));
    document.getElementById('depth-range').value  = val;
    document.getElementById('depth-number').value = val;
    document.getElementById('depth-badge').textContent = val;
  }

  /* ---- log helpers ---- */
  const logEl = () => document.getElementById('log-container');

  function appendLog(text, cls) {
    const div = document.createElement('div');
    div.className = 'log-line ' + (cls || 'log-default');
    div.textContent = text;
    logEl().appendChild(div);
    if (document.getElementById('autoscroll').checked) {
      logEl().scrollTop = logEl().scrollHeight;
    }
  }

  function clearLog() {
    logEl().innerHTML = '';
  }

  function classifyLine(text) {
    if (/\bERROR\b/.test(text))   return 'log-error';
    if (/\bWARNING\b/.test(text)) return 'log-warning';
    if (/Scraped:/.test(text))    return 'log-scraped';
    if (/\bINFO\b/.test(text))    return 'log-info';
    return 'log-default';
  }

  /* ---- stat display ---- */
  function updateStats(stats) {
    if (!stats) return;
    if (stats.requests  !== undefined) document.getElementById('stat-requests').textContent  = stats.requests;
    if (stats.responses !== undefined) document.getElementById('stat-responses').textContent = stats.responses;
    if (stats.items     !== undefined) document.getElementById('stat-items').textContent     = stats.items;
    if (stats.errors    !== undefined) document.getElementById('stat-errors').textContent    = stats.errors;
  }

  /* ---- status indicator ---- */
  function setStatus(status, label) {
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    dot.className = 'dot dot-' + status;
    text.textContent = label;
  }

  /* ---- button state ---- */
  function setRunning(running) {
    document.getElementById('btn-start').disabled = running;
    document.getElementById('btn-stop').disabled  = !running;
  }

  /* ---- SSE connection ---- */
  let evtSource = null;

  function connectSSE() {
    if (evtSource) { evtSource.close(); evtSource = null; }

    evtSource = new EventSource('/api/stream');

    evtSource.addEventListener('heartbeat', () => {/* keep-alive */});

    evtSource.onmessage = function(e) {
      let ev;
      try { ev = JSON.parse(e.data); } catch { return; }

      if (ev.type === 'log') {
        appendLog(ev.data, classifyLine(ev.data));
        if (ev.stats) updateStats(ev.stats);
      } else if (ev.type === 'done') {
        const finished = ev.data.includes('finished');
        setStatus(finished ? 'finished' : 'stopped', ev.data);
        appendLog('— ' + ev.data + ' —', 'log-done');
        updateStats(ev.stats);
        setRunning(false);
        evtSource.close();
        evtSource = null;
      }
    };

    evtSource.onerror = function() {
      // Will auto-reconnect; only mark stopped if we're no longer running
      fetch('/api/status')
        .then(r => r.json())
        .then(d => {
          if (d.status !== 'running') {
            setStatus(d.status, d.status.charAt(0).toUpperCase() + d.status.slice(1));
            setRunning(false);
            if (evtSource) { evtSource.close(); evtSource = null; }
          }
        });
    };
  }

  /* ---- actions ---- */
  async function startCrawl() {
    const url   = document.getElementById('url-input').value.trim();
    const depth = parseInt(document.getElementById('depth-number').value, 10) || 2;

    if (!url) {
      alert('Please enter a target URL.');
      return;
    }

    clearLog();
    // Reset stats
    ['requests','responses','items','errors'].forEach(k =>
      document.getElementById('stat-' + k).textContent = '0'
    );

    setStatus('running', `Crawling \u2014 ${url}`);
    setRunning(true);
    appendLog(`Starting crawl: ${url}  (depth=${depth})`, 'log-info');

    try {
      const resp = await fetch('/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, depth }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        appendLog('Error: ' + (data.error || resp.statusText), 'log-error');
        setStatus('idle', 'Error \u2014 see log');
        setRunning(false);
        return;
      }
    } catch (err) {
      appendLog('Network error: ' + err, 'log-error');
      setStatus('idle', 'Network error');
      setRunning(false);
      return;
    }

    connectSSE();
  }

  async function stopCrawl() {
    setStatus('stopped', 'Stopping\u2026');
    document.getElementById('btn-stop').disabled = true;
    try {
      await fetch('/api/stop', { method: 'POST' });
    } catch { /* ignore */ }
  }

  /* ---- keyboard shortcut ---- */
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      if (!document.getElementById('btn-start').disabled) startCrawl();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === '.') {
      if (!document.getElementById('btn-stop').disabled) stopCrawl();
    }
  });

  /* ---- restore status on page load ---- */
  fetch('/api/status')
    .then(r => r.json())
    .then(d => {
      updateStats(d.stats || {});
      if (d.status === 'running') {
        setStatus('running', 'Crawl in progress\u2026');
        setRunning(true);
        connectSSE();
      }
    })
    .catch(() => {/* not critical */});
</script>
</body>
</html>
